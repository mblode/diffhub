name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to blode.md
        run: npx blodemd push .
        working-directory: apps/docs
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
